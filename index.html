<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="《权力的游戏》原创同人互动地图与人物、家族、地点、战争时间线资料站。">
  <title>权力的游戏 · 七国互动地图</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <div class="brand-block">
        <strong>权力的游戏</strong>
        <span>GAME OF THRONES</span>
        <small>互动地图</small>
      </div>

      <nav class="modebar" aria-label="网站功能导航">
        <button type="button" data-mode="map" class="active">⌂ 地图</button>
        <button type="button" data-mode="story">▣ 剧情</button>
        <button type="button" data-mode="characters">♙ 人物</button>
        <button type="button" data-mode="houses">▤ 家族</button>
        <button type="button" data-mode="places">⌖ 地点</button>
        <button type="button" data-mode="wars">⚔ 战争</button>
        <button type="button" data-mode="timeline">◷ 时间线</button>
        <button type="button" id="relationshipModeButton">⊙ 人物关系</button>
        <button type="button" id="seasonGuideButton" class="season-mode-button">▦ 八季剧情</button>
        <button type="button" data-mode="library">☷ 资料库</button>
      </nav>
    </header>

    <main class="main-layout">
      <section class="map-stage" aria-label="七国互动地图区域">
        <div id="mapCanvas" class="map-canvas">
          <div id="mapSurface" class="map-surface">
            <div id="mapArtwork" class="map-artwork" aria-hidden="true"></div>
            <div id="locationLayer" class="location-layer"></div>
            <svg id="routeLayer" class="route-layer" viewBox="0 0 1000 720" preserveAspectRatio="none" aria-hidden="true"></svg>
          </div>
        </div>

        <div class="map-controls" aria-label="地图缩放控件">
          <button id="zoomIn" type="button" aria-label="放大地图">＋</button>
          <button id="zoomOut" type="button" aria-label="缩小地图">－</button>
          <button id="zoomReset" type="button" aria-label="重置地图">↺</button>
        </div>

        <div id="seasonGuideOverlay" class="season-overlay" hidden></div>
        <div id="relationshipOverlay" class="relationship-overlay" hidden></div>
      </section>

      <aside id="sidePanel" class="side-panel" aria-live="polite">
        <button id="panelClose" class="panel-close" type="button" aria-label="关闭详情">×</button>
        <div class="panel-scroll">
          <div id="panelType" class="panel-type"></div>
          <div id="panelContent" class="panel-content"></div>
        </div>
      </aside>
    </main>

    <footer class="site-footer">
      <p>原创同人示意地图 · 非官方粉丝资料站 · 不使用官方剧照与官方地图</p>
      <p>第二版：新增人物关系图</p>
    </footer>
  </div>

  <noscript>本网站需要启用 JavaScript 才能使用互动地图。</noscript>
  <script src="data.js"></script>
  <script src="app.js"></script>
  <script src="enhancements.js"></script>
  <script src="runtime-fixes.js?v=runtime-repair-7"></script>
</body>
</html>
