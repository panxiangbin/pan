<title>天幕红尘·第一章｜图文穿插阅读</title>
<style>
:root{--paper:#fffaf1;--ink:#2c251d;--muted:#786d61;--gold:#a87331;--line:#eadcc8;--size:18px;--leading:2.02}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:#ece3d6;color:var(--ink);font-family:"Noto Serif SC","Source Han Serif SC","Songti SC",serif}button{font:inherit}.progress{position:fixed;left:0;top:0;width:0;height:3px;background:var(--gold);z-index:100}.app{width:min(100%,720px);min-height:100vh;margin:auto;background:var(--paper);box-shadow:0 0 70px #3c291719}.top{position:sticky;top:0;z-index:30;height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:#fffaf1f2;border-bottom:1px solid var(--line);backdrop-filter:blur(14px)}.brand{color:#936329;font-weight:800;letter-spacing:.12em}.top-actions{display:flex;gap:8px}.round{width:40px;height:40px;border:1px solid var(--line);border-radius:50%;background:#fffdf8;color:#6d6256}.chapter{text-align:center;padding:32px 18px 23px}.chapter small{color:var(--gold);letter-spacing:.22em;font-weight:800}.chapter h1{font-size:clamp(28px,7vw,42px);line-height:1.25;margin:10px 0 8px}.chapter p{margin:0;color:var(--muted);font-size:13px}.reader{padding:0 16px 108px}.prose{font-size:var(--size);line-height:var(--leading);letter-spacing:.025em;text-align:justify;padding:0 6px}.prose p{white-space:pre-wrap;text-indent:2em;margin:0 0 1.3em}.prose.center p{text-indent:0;text-align:center;padding:14px 10px;border-top:1px solid var(--line);border-bottom:1px solid var(--line);font-size:20px}.visual{margin:9px -2px 29px}.visual-frame{position:relative;width:100%;overflow:hidden;border-radius:17px;background:linear-gradient(145deg,#f2e9dc,#dfd0bc);border:1px solid var(--line);box-shadow:0 11px 30px #60431e18}.visual-frame::before{content:"图片加载中…";position:absolute;inset:0;display:grid;place-items:center;color:#9d8e7c;font-size:13px;letter-spacing:.08em}.visual.ready .visual-frame::before{display:none}.visual img{position:relative;z-index:1;display:block;width:100%;height:auto;max-width:100%;opacity:0;transition:opacity .22s ease}.visual.ready img{opacity:1}.visual.failed .visual-frame::before{content:"图片暂时无法加载，请刷新页面"}.visual figcaption{padding:9px 4px 0;color:#87663a;font-size:12px;display:flex;justify-content:space-between;gap:12px}.visual figcaption span:last-child{color:#9b8e80;white-space:nowrap}.divider{width:58px;height:1px;background:#d7bf9e;margin:5px auto 28px;position:relative}.divider::after{content:"◇";position:absolute;left:50%;top:50%;transform:translate(-50%,-52%);background:var(--paper);padding:0 9px;color:#b48750}.hint{text-align:center;color:#9a8d7e;font-size:12px;margin:4px 0 18px}.tools{position:fixed;right:max(12px,calc((100vw - 720px)/2 + 12px));bottom:78px;display:grid;gap:8px;z-index:40}.tools button{width:42px;height:42px;border-radius:50%;border:1px solid var(--line);background:#fffdf8ee;color:#65594d;box-shadow:0 6px 18px #30200f20}.bottom{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:min(100%,720px);height:64px;padding-bottom:env(safe-area-inset-bottom);display:grid;grid-template-columns:repeat(5,1fr);background:#fffaf1f3;border-top:1px solid var(--line);backdrop-filter:blur(14px);z-index:35}.bottom button{border:0;background:none;color:#756a5e;font-size:11px}.bottom .active{color:var(--gold);font-weight:800}body.night{background:#0f0d0b;--paper:#1c1814;--ink:#eee3d4;--muted:#aea08e;--line:#4a3d30;--gold:#d1a25d}body.night .top,body.night .bottom{background:#1c1814f2}body.night .round,body.night .tools button{background:#27211b;color:#eee3d4}body.night .visual-frame{background:linear-gradient(145deg,#2b241d,#16120f)}@media(max-width:480px){.app{box-shadow:none}.reader{padding-left:12px;padding-right:12px}.chapter{padding-top:27px}.prose{padding-left:8px;padding-right:8px;text-align:left}.visual{margin-left:0;margin-right:0;margin-bottom:25px}.visual-frame{border-radius:14px}.visual figcaption{padding-left:3px;padding-right:3px}}
</style>
</head>
<body>
<div class="progress" id="progress"></div>
<main class="app">
<header class="top"><div class="brand">天幕红尘</div><div class="top-actions"><button class="round" id="nightTop" aria-label="夜间模式">◐</button><button class="round" id="topBtn" aria-label="回到顶部">↑</button></div></header>
<section class="chapter"><small>CHAPTER 01</small><h1>第一章 · 莫斯科之夜</h1><p>原著正文与10张剧情图自然穿插</p></section>
<div class="divider"></div>
<article class="reader" id="reader"></article>
<div class="tools"><button id="down" aria-label="缩小字号">A−</button><button id="up" aria-label="放大字号">A＋</button><button id="night" aria-label="夜间模式">◐</button></div>
<nav class="bottom" aria-label="底部导航"><button>⌂<br>首页</button><button>▤<br>书架</button><button class="active">▥<br>阅读</button><button>☆<br>书签</button><button>♙<br>我的</button></nav>
</main>
<script src="chapter-01.js?v=4"></script>
<script src="pack-1.js?v=4"></script><script src="pack-2.js?v=4"></script><script src="pack-3.js?v=4"></script><script src="pack-4.js?v=4"></script><script src="pack-5.js?v=4"></script><script src="pack-6.js?v=4"></script>
<script>
try{if(window.TM_PACK)eval(atob(window.TM_PACK))}catch(e){console.warn('内置图片包读取失败',e)}
const hd=[
 {url:'https://cdn-editing-temp.picsart.com/editing-temp/2038b282-c3b9-4753-a778-f933671dc980.png',label:'窗前的莫斯科夏夜',w:1672,h:941},
 {url:'https://cdn-editing-temp.picsart.com/editing-temp/83ac9049-4bc4-451a-b7a4-9aeab7fb217e.png',label:'电视重播戈尔巴乔夫声明',w:941,h:1672},
 {url:'https://cdn-editing-temp.picsart.com/editing-temp/2fb1d98e-dfa9-478f-9c76-8759fd1a7fcf.png',label:'石油投资崩塌',w:941,h:1672},
 {url:'https://cdn-editing-temp.picsart.com/editing-temp/aee9dd7e-7840-4f62-9a0f-259247e69588.png',label:'想起远在纽约的家人',w:1536,h:1024},
 {url:'https://cdn-editing-temp.picsart.com/editing-temp/7453dffc-8c74-463d-9625-bdb5493f90ec.png',label:'最后一支烟',w:1448,h:1086},
 {url:'https://cdn-editing-temp.picsart.com/editing-temp/a6ee8b23-bf41-4154-8a54-74986de8368e.png',label:'关掉电视',w:941,h:1672},
 {url:'https://cdn-editing-temp.picsart.com/editing-temp/ee73424a-f754-4240-9322-9e22c532ac74.png',label:'打开抽屉',w:941,h:1672},
 {url:'https://cdn-editing-temp.picsart.com/editing-temp/96bacaea-68ff-483f-9f48-c4d996b915c6.png',label:'礼品盒里的左轮手枪',w:1448,h:1086},
 {url:'https://cdn-editing-temp.picsart.com/editing-temp/3ff5b33f-43cc-483b-a75e-f78263c1009b.png',label:'留下两句遗言',w:941,h:1672},
 {url:'https://cdn-editing-temp.picsart.com/editing-temp/ebad6f1e-b76d-4887-a0f2-8cfee4f8fb00.png',label:'枪声后的空办公室',w:941,h:1672}
];
const paras=(window.CHAPTERS?.[0]?.body||'').split(/\n\n+/).map(s=>s.trim()).filter(Boolean);
function splitAfter(text,mark){const n=text.indexOf(mark);return n<0?[text,'']:[text.slice(0,n+mark.length).trim(),text.slice(n+mark.length).trim()]}
const street=splitAfter(paras[1]||'','静静地从12楼俯看楼下的大街。');
const tv=splitAfter(paras[2]||'','办公室里只有办公桌的台灯开着，光线很暗。');
const collapse=splitAfter(paras[3]||'','然而他输了！');
const family=splitAfter(paras[4]||'','她们往后可怎么活呢？');
const smoke=splitAfter(paras[5]||'','徐徐吐出');
let action=paras[6]||'';
const a1=splitAfter(action,'把烟蒂拧进办公桌上的烟灰缸，');action=a1[1];
const a2=splitAfter(action,'取出一个礼品盒，');action=a2[1];
const a3=splitAfter(action,'放到右手边，');action=a3[1];
const a4=splitAfter(action,'只写了两句——');
const flow=[
 {type:'text',parts:[paras[0],street[0]]},{type:'image',i:0},{type:'text',parts:[street[1]]},
 {type:'text',parts:[tv[0]]},{type:'image',i:1},{type:'text',parts:[tv[1]]},
 {type:'text',parts:[collapse[0]]},{type:'image',i:2},{type:'text',parts:[collapse[1]]},
 {type:'text',parts:[family[0]]},{type:'image',i:3},{type:'text',parts:[family[1]]},
 {type:'text',parts:[smoke[0]]},{type:'image',i:4},{type:'text',parts:[smoke[1],a1[0]]},
 {type:'image',i:5},{type:'text',parts:[a2[0]]},{type:'image',i:6},
 {type:'text',parts:[a3[0]]},{type:'image',i:7},{type:'text',parts:[a4[0]]},{type:'image',i:8},
 {type:'text',parts:[a4[1],paras[7],paras[8],paras[9],paras[10]],center:true},{type:'image',i:9}
];
const reader=document.getElementById('reader');
function addText(item){const parts=item.parts.filter(Boolean);if(!parts.length)return;const section=document.createElement('section');section.className='prose'+(item.center?' center':'');parts.forEach(t=>{const p=document.createElement('p');p.textContent=t;section.appendChild(p)});reader.appendChild(section)}
function addImage(i){const s=hd[i];const figure=document.createElement('figure');figure.className='visual';const frame=document.createElement('div');frame.className='visual-frame';frame.style.aspectRatio=s.w+'/'+s.h;const img=document.createElement('img');img.alt=s.label;img.width=s.w;img.height=s.h;img.loading=i<2?'eager':'lazy';img.decoding='async';img.referrerPolicy='no-referrer';let fallbackUsed=false;const fallback=()=>{if(fallbackUsed){figure.classList.add('failed');return}fallbackUsed=true;const local=window.TM_IMAGES?.[i];if(local){img.src=local}else{figure.classList.add('failed')}};img.onload=()=>{if(img.naturalWidth){figure.classList.add('ready');figure.classList.remove('failed')}};img.onerror=fallback;img.src=s.url;setTimeout(()=>{if(!img.complete||!img.naturalWidth)fallback()},5000);frame.appendChild(img);figure.appendChild(frame);const cap=document.createElement('figcaption');cap.innerHTML='<span>场景 '+String(i+1).padStart(2,'0')+' · '+s.label+'</span><span>'+(i<2?'优先加载':'滚动加载')+'</span>';figure.appendChild(cap);reader.appendChild(figure)}
flow.forEach(item=>item.type==='text'?addText(item):addImage(item.i));
const hint=document.createElement('div');hint.className='hint';hint.textContent='高清图片加载失败时会自动切换为站内备用图，不再出现黑方块。';reader.appendChild(hint);
let size=18;const applySize=()=>document.documentElement.style.setProperty('--size',size+'px');document.getElementById('up').onclick=()=>{size=Math.min(24,size+1);applySize()};document.getElementById('down').onclick=()=>{size=Math.max(15,size-1);applySize()};const toggleNight=()=>document.body.classList.toggle('night');document.getElementById('night').onclick=toggleNight;document.getElementById('nightTop').onclick=toggleNight;document.getElementById('topBtn').onclick=()=>scrollTo({top:0,behavior:'smooth'});addEventListener('scroll',()=>{const h=document.documentElement.scrollHeight-innerHeight;document.getElementById('progress').style.width=(h>0?scrollY/h*100:0)+'%'},{passive:true});
</script>
</body>
