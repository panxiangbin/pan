name: Cover browser smoke

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  browser:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright@1.54.1
          npx playwright install --with-deps chromium

      - name: Start static server
        run: |
          python3 -m http.server 4173 >/tmp/pan-http.log 2>&1 &
          echo $! >/tmp/pan-http.pid
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:4173/ >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/pan-http.log
          exit 1

      - name: Run cover browser diagnosis
        run: node tests/cover-browser-smoke.mjs

      - name: Upload diagnosis
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cover-browser-diagnosis
          path: |
            cover-browser-result.json
            cover-browser-screenshot.png
            /tmp/pan-http.log
          if-no-files-found: ignore
          retention-days: 1