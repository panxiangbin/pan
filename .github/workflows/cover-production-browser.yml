name: Production cover browser test

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  browser:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright@1.54.1
          npx playwright install --with-deps chromium

      - name: Start static server
        run: |
          python3 -m http.server 4173 >/tmp/pan-http.log 2>&1 &
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:4173/ >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/pan-http.log
          exit 1

      - name: Test production code locally
        env:
          OUTPUT_PREFIX: local-cover-browser
        run: node tests/cover-browser-smoke.mjs

      - name: Wait for GitHub Pages deployment
        shell: bash
        run: |
          set -euo pipefail
          for i in {1..72}; do
            html="$(curl -fsSL --max-time 20 'https://panxiangbin.github.io/pan/?v=cover-art-10' || true)"
            if grep -q 'runtime-fixes.js?v=cover-art-10' <<<"$html"; then
              echo "GitHub Pages 已发布 cover-art-10"
              exit 0
            fi
            echo "等待 GitHub Pages 发布：第 $i 次"
            sleep 10
          done
          echo "GitHub Pages 在等待时间内未发布 cover-art-10"
          exit 1

      - name: Test public GitHub Pages in Chromium
        env:
          BASE_URL: https://panxiangbin.github.io/pan
          OUTPUT_PREFIX: public-cover-browser
        run: node tests/cover-browser-smoke.mjs

      - name: Upload screenshots and results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-cover-browser-result
          path: |
            local-cover-browser-result.json
            local-cover-browser-screenshot.png
            public-cover-browser-result.json
            public-cover-browser-screenshot.png
          if-no-files-found: ignore
          retention-days: 1
