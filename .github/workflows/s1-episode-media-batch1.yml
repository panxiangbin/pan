name: S1 episode media batch 1 browser test

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  browser:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Syntax and static tests
        run: |
          node --check season1-episode-visuals.js
          node --check runtime-fixes.js
          node tests/entry-smoke.mjs
          node tests/validate-site.mjs
      - name: Install Chromium quietly
        run: |
          npm init -y >/dev/null 2>&1
          npm install playwright@1.54.1 >/dev/null 2>&1
          npx playwright install --with-deps chromium >/dev/null 2>&1
      - name: Start site
        run: |
          python3 -m http.server 4173 >/tmp/pan-http.log 2>&1 &
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:4173/ >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/pan-http.log
          exit 1
      - name: Browser test
        run: node tests/s1-episode-media-batch1.mjs
      - name: Upload screenshot and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: s1-episode-media-batch1-result
          path: |
            s1-episode-media-batch1.png
            s1-episode-media-batch1.json
          if-no-files-found: ignore
          retention-days: 1