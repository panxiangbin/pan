<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc"><title id="title">第4季 审判与复仇 剧情信息图</title><desc id="desc">原创同人剧情信息图，包含本季主线、关键转折、人物焦点、结局影响与五段剧情章节。</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#071018"/><stop offset=".55" stop-color="#101820"/><stop offset="1" stop-color="#05080c"/></linearGradient><radialGradient id="glow"><stop offset="0" stop-color="#8d6bb0" stop-opacity=".4"/><stop offset="1" stop-color="#8d6bb0" stop-opacity="0"/></radialGradient><linearGradient id="line" x1="0" x2="1"><stop stop-color="#8d6bb0"/><stop offset="1" stop-color="#d1a65f"/></linearGradient><pattern id="grain" width="24" height="24" patternUnits="userSpaceOnUse"><circle cx="3" cy="5" r="1" fill="#fff" opacity=".025"/><circle cx="17" cy="16" r="1" fill="#fff" opacity=".02"/></pattern></defs><style>.title{font:700 50px 'Noto Serif SC','Songti SC','Microsoft YaHei',serif;fill:#f4ead4;letter-spacing:1px}.subtitle{font:400 24px 'Noto Sans SC','Microsoft YaHei',sans-serif;fill:#b8c2c5}.season{font:700 176px Georgia,serif;fill:url(#line);opacity:.92}.mark{font:700 46px 'Noto Serif SC','Microsoft YaHei',serif;fill:#101820}.card rect{fill:#111a21;fill-opacity:.96;stroke:#8d6bb0;stroke-opacity:.18;stroke-width:2}.label{font:700 22px 'Noto Sans SC','Microsoft YaHei',sans-serif;fill:#d1a65f;letter-spacing:2px}.body{font:400 20px 'Noto Sans SC','Microsoft YaHei',sans-serif;fill:#d9e0df}.chapter{font:600 18px 'Noto Sans SC','Microsoft YaHei',sans-serif;fill:#d7d0c0}.node{fill:#0d151b;stroke:url(#line);stroke-width:4}.node-num{font:700 18px Georgia,serif;fill:#f4ead4}.footer{font:400 15px 'Noto Sans SC','Microsoft YaHei',sans-serif;fill:#74858a;letter-spacing:1px}</style><rect width="1600" height="900" fill="url(#bg)"/><rect width="1600" height="900" fill="url(#grain)"/><circle cx="245" cy="240" r="320" fill="url(#glow)"/><circle cx="1510" cy="850" r="360" fill="url(#glow)" opacity=".5"/><path d="M70 105H1530" stroke="url(#line)" stroke-width="2" opacity=".45"/><path d="M70 742H1530" stroke="url(#line)" stroke-width="2" opacity=".28"/><g transform="translate(80 135)"><text x="0" y="150" class="season">S4</text><circle cx="190" cy="238" r="70" fill="#d1a65f"/><text x="190" y="254" text-anchor="middle" class="mark">审</text></g><text x="80" y="465" class="title">第4季 · 审判与复仇</text><text x="82" y="512" class="subtitle">国王倒下，长城迎战，旧秩序开始裂解</text><text x="82" y="570" class="footer">七国风云图志 · 原创同人剧情信息图 · 非官方剧照</text><g class="card"><rect x="650" y="165" width="410" height="215" rx="24"/><text x="676" y="207" class="label">本季主线</text><text x="676" y="249" class="body"><tspan x="676" dy="0">乔佛里在婚宴中毒身亡，提利昂成为替罪</tspan><tspan x="676" dy="31">羊；奥柏伦带着多恩旧仇进入君临，守夜</tspan><tspan x="676" dy="31">人则面对自由民大军。</tspan></text></g><g class="card"><rect x="1090" y="165" width="410" height="215" rx="24"/><text x="1116" y="207" class="label">关键转折</text><text x="1116" y="249" class="body"><tspan x="1116" dy="0">提利昂要求比武审判，奥柏伦在即将获胜</tspan><tspan x="1116" dy="31">时被魔山杀死；长城之战迫使守夜人正视</tspan><tspan x="1116" dy="31">北方威胁。</tspan></text></g><g class="card"><rect x="650" y="420" width="410" height="215" rx="24"/><text x="676" y="462" class="label">人物焦点</text><text x="676" y="504" class="body"><tspan x="676" dy="0">提利昂 · 奥柏伦 · 詹姆 · 琼恩 · 艾莉亚</tspan></text></g><g class="card"><rect x="1090" y="420" width="410" height="215" rx="24"/><text x="1116" y="462" class="label">结局影响</text><text x="1116" y="504" class="body"><tspan x="1116" dy="0">提利昂杀死雪伊与泰温后逃亡；艾莉亚驶</tspan><tspan x="1116" dy="31">向布拉佛斯；史坦尼斯救援长城。</tspan></text></g><text x="80" y="710" class="label">五段剧情脉络</text><path d="M150 790H1270" stroke="url(#line)" stroke-width="4" stroke-linecap="round" opacity=".65"/><g><circle cx="150" cy="790" r="26" class="node"/><text x="150" y="798" text-anchor="middle" class="node-num">1</text><text x="150" y="846" text-anchor="middle" class="chapter">紫色婚礼</text></g><g><circle cx="430" cy="790" r="26" class="node"/><text x="430" y="798" text-anchor="middle" class="node-num">2</text><text x="430" y="846" text-anchor="middle" class="chapter">审判之前</text></g><g><circle cx="710" cy="790" r="26" class="node"/><text x="710" y="798" text-anchor="middle" class="node-num">3</text><text x="710" y="846" text-anchor="middle" class="chapter">法庭上的彻底决裂</text></g><g><circle cx="990" cy="790" r="26" class="node"/><text x="990" y="798" text-anchor="middle" class="node-num">4</text><text x="990" y="846" text-anchor="middle" class="chapter">毒蛇与魔山</text></g><g><circle cx="1270" cy="790" r="26" class="node"/><text x="1270" y="798" text-anchor="middle" class="node-num">5</text><text x="1270" y="846" text-anchor="middle" class="chapter">长城之战与弑父</text></g><text x="1518" y="870" text-anchor="end" class="footer">SEASON 4 / 8</text></svg>